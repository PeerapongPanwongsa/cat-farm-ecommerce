version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: sh -c "go run main.go"
    ports:
      - "8080:8080"
    volumes:
      - ../backend:/app

  db:
    image: postgres:13
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: catfarmdb